[build]
  command = "npm --prefix netlify/functions ci && npm --prefix checklist-react ci && npm --prefix checklist-react run build"
  publish = "checklist-react/dist"

[functions]
  directory = "netlify/functions"
  # pdfkit + fontkit dùng require/fs nội bộ — esbuild bundle hay làm hỏng runtime trên Netlify → để external
  node_bundler = "esbuild"
  external_node_modules = ["pdfkit", "fontkit", "crypto-js", "jpeg-exif", "linebreak", "png-js"]

# Chạy local một lệnh: từ gốc repo `npm run dev` (cần netlify-cli). App: http://localhost:8888
[dev]
  command = "npm run dev --prefix checklist-react"
  targetPort = 5173
