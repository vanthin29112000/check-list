[build]
  command = "npm --prefix netlify/functions ci && npm --prefix checklist-react ci && npm --prefix checklist-react run build"
  publish = "checklist-react/dist"

# React Router: /approve, /dashboard, … không phải file tĩnh — trả index.html để app xử lý (tránh 404 Netlify).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  directory = "netlify/functions"
  # Đóng gói file .ttf cùng function (đọc qua fs lúc chạy, không qua import — bundler bỏ qua nếu không khai báo)
  included_files = ["netlify/functions/fonts/**"]
  # pdfkit + fontkit dùng require/fs nội bộ — esbuild bundle hay làm hỏng runtime trên Netlify → để external
  node_bundler = "esbuild"
  external_node_modules = ["pdfkit", "fontkit", "crypto-js", "jpeg-exif", "linebreak", "png-js"]

# Chạy local: từ gốc repo `npm install` rồi `npm run dev` → mở http://localhost:8888
# (chạy song song Netlify Functions :8888 + Vite :5173; cần điền VITE_FIREBASE_* trong checklist-react/.env)
[dev]
  framework = "#custom"
  command = "node scripts/dev-web.mjs"
  targetPort = 5173
  port = 8888
  pollingStrategies = ["HTTP"]
